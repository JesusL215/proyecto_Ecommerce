<header class="header">
  <!-- Logo -->
  <div class="header__logo">
    <span class="logo-text">Master</span><span class="logo-highlight">Tech</span>
  </div>

  <!-- Mobile Menu Toggle -->
  <button class="header__menu-btn" (click)="toggleMenu()" aria-label="Toggle menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <!-- Navigation -->
  <nav class="header__nav" [class.open]="isMenuOpen">
    <ul class="nav-list">
      <li class="nav-item"><a [routerLink]="['/']" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" class="nav-link">INICIO</a></li>
      <li class="nav-item">
        <a [routerLink]="['/productos']" routerLinkActive="active" class="nav-link">
          PRODUCTOS
          <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
          </svg>
        </a>
      </li>
      <li class="nav-item"><a [routerLink]="['/ofertas']" routerLinkActive="active" class="nav-link">OFERTAS</a></li>
      <li class="nav-item"><a href="#" class="nav-link">SOPORTE</a></li>
    </ul>
  </nav>

  <!-- Actions (Cart & Login) -->
  <div class="header__actions" [class.open]="isMenuOpen">
    <button class="cart-btn" aria-label="Cart">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
    </button>
    <button class="login-btn">Iniciar Sesión</button>
  </div>
</header>

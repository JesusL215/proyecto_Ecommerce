<div class="product-page">

  <div class="page-header">
    <h1 class="page-title">PRODUCTOS</h1>
  </div>

  <div class="product-container">

    <!-- Sidebar Filters -->
    <aside class="sidebar-filters">
      <details class="mobile-filters-details" open>
        <summary class="mobile-filters-summary">
          <div class="filters-header">
            <h2 class="filters-title">FILTROS</h2>
            <button class="clear-btn">Limpiar</button>
          </div>
        </summary>

        <div class="filters-content">
          <!-- Categoría -->
          <div class="filter-section">
            <h3 class="filter-section-title">Categoría</h3>
            <ul class="filter-list">
              <li><label><input type="radio" name="cat" checked> Todos</label></li>
              <li><label><input type="radio" name="cat"> Laptops</label></li>
              <li><label><input type="radio" name="cat"> Smartphones</label></li>
              <li><label><input type="radio" name="cat"> Tablets</label></li>
              <li><label><input type="radio" name="cat"> Gaming</label></li>
              <li><label><input type="radio" name="cat"> Accesorios</label></li>
            </ul>
          </div>

          <!-- Marca -->
          <div class="filter-section">
            <h3 class="filter-section-title">Marca</h3>
            <ul class="filter-list">
              <li><label><input type="radio" name="brand" checked> Todos</label></li>
              <li><label><input type="radio" name="brand"> Apple</label></li>
              <li><label><input type="radio" name="brand"> Samsung</label></li>
              <li><label><input type="radio" name="brand"> Xiaomi</label></li>
              <li><label><input type="radio" name="brand"> Acer</label></li>
              <li><label><input type="radio" name="brand"> Dell</label></li>
              <li><label><input type="radio" name="brand"> Logitech</label></li>
              <li><label><input type="radio" name="brand"> VRB</label></li>
            </ul>
          </div>

          <!-- Precio -->
          <div class="filter-section">
            <h3 class="filter-section-title">Precio</h3>
            <ul class="filter-list">
              <li><label><input type="radio" name="price" checked> Todos</label></li>
              <li><label><input type="radio" name="price"> Menos de $500</label></li>
              <li><label><input type="radio" name="price"> $500 - $1000</label></li>
              <li><label><input type="radio" name="price"> $1000 - $2000</label></li>
              <li><label><input type="radio" name="price"> Más de $2000</label></li>
            </ul>
          </div>
        </div>
      </details>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <p class="results-text">Mostrando {{ pageProducts.length }} productos</p>

      <app-product-list [products]="pageProducts"></app-product-list>
    </main>

  </div>
</div>

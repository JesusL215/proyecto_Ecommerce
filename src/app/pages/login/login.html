<section class="auth-page">
  <aside class="auth-visual">
    <a routerLink="/" class="brand auth-brand">Master<span>Tech</span></a>

    <div class="auth-copy">
      <div class="red-line"></div>
      <h1>Bienvenido de vuelta</h1>
      <p>Accede a tu cuenta para gestionar tus pedidos, revisar tu historial de compras y acceder a ofertas exclusivas.</p>
    </div>

    <div class="auth-stats">
      <div><strong>10K+</strong><span>Clientes</span></div>
      <div><strong>500+</strong><span>Productos</span></div>
      <div><strong>99%</strong><span>Satisfacción</span></div>
    </div>
  </aside>

  <div class="auth-panel">
    <div class="auth-form">
      <a routerLink="/" class="back-link">← Volver al inicio</a>
      <h1>Iniciar Sesión</h1>

      <label>
        Correo electrónico
        <div class="input-icon">
          <span>✉</span>
          <input type="email" placeholder="tucorreo@ejemplo.com">
        </div>
      </label>

      <label>
        <span class="label-row">
          Contraseña
          <a href="#">¿Olvidaste tu contraseña?</a>
        </span>
        <div class="input-icon">
          <span>🔒</span>
          <input type="password" placeholder="••••••••">
          <span>👁</span>
        </div>
      </label>

      <label class="check-row">
        <input type="checkbox">
        Recordar mi sesión
      </label>

      <button class="btn btn-primary full" type="button">Iniciar Sesión</button>

      <div class="separator">o continúa con</div>

      <div class="social-login">
        <button type="button">G Google</button>
        <button type="button">f Facebook</button>
      </div>

      <p class="auth-switch">¿No tienes cuenta? <a routerLink="/registro">Crear cuenta gratis</a></p>
    </div>
  </div>
</section>
